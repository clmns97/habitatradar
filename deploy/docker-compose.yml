# HabitatRadar app stack for the server.
#
# Postgres is NOT defined here — it is a shared PostGIS server already running on
# this host. We attach to its external Docker network and reach it by its service
# name, so DB traffic never leaves Docker.
#
# Copy .env.example to .env and fill in the secrets before `docker compose up`.
name: habitatradar

services:
  backend:
    build:
      context: ../backend
    image: habitatradar-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}          # read-only role
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PORT: "8080"
    networks: [db, web]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

  # One-shot loader. Not started by `up` (profile gate); run on a schedule via
  #   docker compose --profile etl run --rm etl
  etl:
    build:
      context: ../backend
      dockerfile: etl/Dockerfile
    image: habitatradar-etl
    profiles: ["etl"]
    environment:
      IMPORT_DATABASE_URL: ${IMPORT_DATABASE_URL}   # write role
      WFS_URL: ${WFS_URL:-}
      ETL_PARALLEL: ${ETL_PARALLEL:-3}
    networks: [db]

networks:
  db:
    external: true
    name: postgis_postgis_network
  web: {}

volumes:
  caddy_data: {}
  caddy_config: {}
